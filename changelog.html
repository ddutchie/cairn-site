<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — Cairn</title>
  <meta name="description" content="Release notes for every version of Cairn.">
  <meta property="og:title" content="Changelog — Cairn">
  <meta property="og:description" content="Release notes for every version of Cairn.">
  <meta property="og:image" content="https://ddutchie.github.io/cairn-site/assets/screenshots/og-image.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ddutchie.github.io/cairn-site/changelog.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Changelog — Cairn">
  <meta name="twitter:description" content="Release notes for every version of Cairn.">
  <meta name="twitter:image" content="https://ddutchie.github.io/cairn-site/assets/screenshots/og-image.png">
  <meta name="theme-color" content="#7c6af7">
  <link rel="canonical" href="https://ddutchie.github.io/cairn-site/changelog.html">
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .changelog-page {
      max-width: 720px;
      margin-inline: auto;
      padding: 64px 24px 96px;
    }

    .changelog-header {
      margin-bottom: 56px;
    }

    .changelog-header h1 {
      font-size: clamp(28px, 3vw, 38px);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .changelog-header p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* Individual release */
    .release {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0 40px;
      padding-bottom: 56px;
      margin-bottom: 56px;
      border-bottom: 1px solid var(--border);
    }

    .release:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .release-meta {
      padding-top: 4px;
    }

    .release-tag {
      display: inline-block;
      font-family: "Geist Mono", monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(124, 106, 247, 0.3);
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      margin-bottom: 8px;
    }

    .release-date {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .release-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.015em;
      margin-bottom: 16px;
    }

    /* Rendered markdown body */
    .release-body h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 24px;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .release-body h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 16px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .release-body h2:first-child,
    .release-body h3:first-child { margin-top: 0; }

    .release-body p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .release-body ul,
    .release-body ol {
      margin-bottom: 12px;
    }

    .release-body ul li,
    .release-body ol li {
      font-size: 14px;
      color: var(--text-secondary);
      padding: 2px 0 2px 16px;
      position: relative;
      line-height: 1.6;
    }

    .release-body ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .release-body ol {
      counter-reset: ol-counter;
    }
    .release-body ol li { counter-increment: ol-counter; }
    .release-body ol li::before {
      content: counter(ol-counter) '.';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }

    .release-body strong { color: var(--text-primary); font-weight: 600; }
    .release-body em { font-style: italic; }

    .release-body code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: "Geist Mono", monospace;
      color: var(--text-primary);
    }

    .release-body pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .release-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
      line-height: 1.6;
    }

    .release-body a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(124, 106, 247, 0.4);
    }

    .release-body blockquote {
      border-left: 3px solid var(--accent);
      background: var(--surface-2);
      border-radius: 0 6px 6px 0;
      padding: 10px 16px;
      margin-bottom: 12px;
    }
    .release-body blockquote p { margin: 0; color: var(--text-secondary); }

    .release-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* Tables */
    .release-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 16px;
      overflow-x: auto;
      display: block;
    }

    .release-body th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      white-space: nowrap;
    }

    .release-body td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      vertical-align: top;
    }

    .release-body tr:last-child td { border-bottom: none; }

    /* Collapsed release */
    .release.collapsed .release-body {
      display: none;
    }

    .release.collapsed .release-name {
      margin-bottom: 0;
    }

    .release-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: "Geist", sans-serif;
      font-size: 13px;
      color: var(--text-tertiary);
      padding: 0;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 150ms;
    }
    .release-toggle:hover { color: var(--accent); }

    .release-toggle svg {
      transition: transform 200ms;
      flex-shrink: 0;
    }
    .release.collapsed .release-toggle svg { transform: rotate(-90deg); }

    /* Show more button */
    .show-more-wrap {
      text-align: center;
      padding: 32px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .show-more-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-family: "Geist", sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 20px;
      cursor: pointer;
      transition: border-color 150ms, color 150ms;
    }
    .show-more-btn:hover { color: var(--text-primary); border-color: var(--accent); }

    /* Loading / error states */
    .changelog-state {
      text-align: center;
      padding: 64px 0;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .changelog-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .release {
        grid-template-columns: 1fr;
        gap: 12px 0;
      }
    }
  </style>
</head>
<body>

      <a href="https://github.com/ddutchie/cairn" target="_blank" rel="noopener">GitHub ↗</a>
      <a href="https://github.com/ddutchie/cairn/releases">Download</a>
    </nav>
  </header>

  <div class="changelog-page">
    <div class="changelog-header">
      <h1>Changelog</h1>
      <p>Every release, straight from GitHub.</p>
    </div>

    <div id="releases-container">
      <div class="changelog-state">
        <div class="changelog-spinner"></div>
        Loading releases…
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    (function () {
      const container = document.getElementById('releases-container');
      const API = 'https://api.github.com/repos/ddutchie/cairn/releases';
      const FULL_COUNT = 3;   // first N shown expanded
      const PAGE_SIZE = 10;   // show more adds this many collapsed at a time

      // ── HTML escape ────────────────────────────────────────
      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── Full markdown → HTML renderer ─────────────────────
      function renderMarkdown(md) {
        if (!md) return '';

        // Inline formatter
        function inline(s) {
          // Escape raw HTML entities first
          s = s.replace(/&(?![a-zA-Z#]\w{0,6};)/g, '&amp;');
          // Fenced code (inline)
          s = s.replace(/`([^`]+)`/g, function(_, c) { return '<code>' + esc(c) + '</code>'; });
          // Bold + italic
          s = s.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
          // Bold
          s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
          s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
          // Italic
          s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
          s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
          // Strikethrough
          s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
          // Links
          s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
          return s;
        }

        const lines = md.split('\n');
        const out = [];
        let i = 0;

        // Helpers to track open block-level elements
        let inUl = false, inOl = false, inBlockquote = false, inPre = false;
        let preLines = [];

        function closeUl()  { if (inUl)  { out.push('</ul>');         inUl = false; } }
        function closeOl()  { if (inOl)  { out.push('</ol>');         inOl = false; } }
        function closeBq()  { if (inBlockquote) { out.push('</blockquote>'); inBlockquote = false; } }
        function closeAll() { closeUl(); closeOl(); closeBq(); }

        while (i < lines.length) {
          const line = lines[i];

          // ── Fenced code block ──────────────────────────────
          if (/^```/.test(line)) {
            closeAll();
            const lang = line.replace(/^```/, '').trim();
            const codeLines = [];
            i++;
            while (i < lines.length && !/^```/.test(lines[i])) {
              codeLines.push(esc(lines[i]));
              i++;
            }
            out.push('<pre><code' + (lang ? ' class="language-' + esc(lang) + '"' : '') + '>' + codeLines.join('\n') + '</code></pre>');
            i++;
            continue;
          }

          // ── Horizontal rule ────────────────────────────────
          if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) {
            closeAll();
            out.push('<hr>');
            i++;
            continue;
          }

          // ── Headings ───────────────────────────────────────
          const h = line.match(/^(#{1,6})\s+(.+)/);
          if (h) {
            closeAll();
            const level = Math.min(h[1].length + 1, 4); // h1→h2, h2→h2, h3→h3, h4→h3
            const tag = level <= 2 ? 'h2' : 'h3';
            out.push('<' + tag + '>' + inline(h[2]) + '</' + tag + '>');
            i++;
            continue;
          }

          // ── Table ──────────────────────────────────────────
          if (/\|/.test(line) && i + 1 < lines.length && /^\|?[\s:|-]+\|/.test(lines[i + 1])) {
            closeAll();
            const headerCells = line.split('|').filter(function(c, idx, arr) {
              return idx > 0 && idx < arr.length - 1;
            }).map(function(c) { return '<th>' + inline(c.trim()) + '</th>'; });
            i += 2; // skip separator row
            const bodyRows = [];
            while (i < lines.length && /\|/.test(lines[i]) && !/^(#{1,6}|\s*[-*] |>\s|\d+\.\s)/.test(lines[i])) {
              const cells = lines[i].split('|').filter(function(c, idx, arr) {
                return idx > 0 && idx < arr.length - 1;
              }).map(function(c) { return '<td>' + inline(c.trim()) + '</td>'; });
              bodyRows.push('<tr>' + cells.join('') + '</tr>');
              i++;
            }
            out.push('<table><thead><tr>' + headerCells.join('') + '</tr></thead><tbody>' + bodyRows.join('') + '</tbody></table>');
            continue;
          }

          // ── Blockquote ─────────────────────────────────────
          if (/^>\s?/.test(line)) {
            if (!inBlockquote) { out.push('<blockquote>'); inBlockquote = true; }
            closeUl(); closeOl();
            out.push('<p>' + inline(line.replace(/^>\s?/, '')) + '</p>');
            i++;
            continue;
          } else {
            closeBq();
          }

          // ── Unordered list ─────────────────────────────────
          if (/^[-*+] (.+)/.test(line)) {
            closeOl();
            if (!inUl) { out.push('<ul>'); inUl = true; }
            out.push('<li>' + inline(line.replace(/^[-*+] /, '')) + '</li>');
            i++;
            continue;
          }

          // ── Ordered list ───────────────────────────────────
          if (/^\d+\.\s(.+)/.test(line)) {
            closeUl();
            if (!inOl) { out.push('<ol>'); inOl = true; }
            out.push('<li>' + inline(line.replace(/^\d+\.\s/, '')) + '</li>');
            i++;
            continue;
          }

          // ── Blank line ─────────────────────────────────────
          if (line.trim() === '') {
            closeAll();
            i++;
            continue;
          }

          // ── Paragraph ──────────────────────────────────────
          closeAll();
          out.push('<p>' + inline(line) + '</p>');
          i++;
        }

        closeAll();
        return out.join('\n');
      }

      // ── Format date ────────────────────────────────────────
      function formatDate(iso) {
        return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      }

      // ── Build a release element ────────────────────────────
      function buildRelease(r, collapsed) {
        const el = document.createElement('div');
        el.className = 'release' + (collapsed ? ' collapsed' : '');

        const chevron = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l4 4 4-4"/></svg>';

        el.innerHTML = [
          '<div class="release-meta">',
          '  <div class="release-tag">' + esc(r.tag_name) + '</div>',
          '  <div class="release-date">' + formatDate(r.published_at) + '</div>',
          '</div>',
          '<div class="release-content">',
          '  <div class="release-name">' + esc(r.name) + '</div>',
          '  <div class="release-body">' + renderMarkdown(r.body) + '</div>',
          '  <button class="release-toggle" aria-expanded="' + (!collapsed) + '">' + chevron + (collapsed ? 'Show notes' : 'Hide notes') + '</button>',
          '</div>',
        ].join('\n');

        el.querySelector('.release-toggle').addEventListener('click', function () {
          const isCollapsed = el.classList.toggle('collapsed');
          this.setAttribute('aria-expanded', String(!isCollapsed));
          this.innerHTML = chevron + (isCollapsed ? 'Show notes' : 'Hide notes');
        });

        return el;
      }

      // ── Fetch & render ─────────────────────────────────────
      fetch(API)
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (releases) {
          if (!releases.length) {
            container.innerHTML = '<div class="changelog-state">No releases yet.</div>';
            return;
          }

          container.innerHTML = '';

          // First FULL_COUNT — expanded
          const initial = releases.slice(0, FULL_COUNT);
          initial.forEach(function (r) {
            container.appendChild(buildRelease(r, false));
          });

          const remaining = releases.slice(FULL_COUNT);
          if (!remaining.length) return;

          // Next batch — collapsed but visible
          let shown = 0;
          const hiddenAfter10 = remaining.slice(PAGE_SIZE);
          const firstBatch = remaining.slice(0, PAGE_SIZE);

          firstBatch.forEach(function (r) {
            container.appendChild(buildRelease(r, true));
            shown++;
          });

          // If there are more beyond PAGE_SIZE, add a Show More button
          if (hiddenAfter10.length) {
            let nextStart = 0;

            const wrap = document.createElement('div');
            wrap.className = 'show-more-wrap';

            const btn = document.createElement('button');
            btn.className = 'show-more-btn';
            btn.textContent = 'Show ' + Math.min(PAGE_SIZE, hiddenAfter10.length) + ' older releases';
            wrap.appendChild(btn);
            container.appendChild(wrap);

            btn.addEventListener('click', function () {
              const batch = hiddenAfter10.slice(nextStart, nextStart + PAGE_SIZE);
              batch.forEach(function (r) {
                container.insertBefore(buildRelease(r, true), wrap);
              });
              nextStart += batch.length;

              const left = hiddenAfter10.length - nextStart;
              if (left <= 0) {
                wrap.remove();
              } else {
                btn.textContent = 'Show ' + Math.min(PAGE_SIZE, left) + ' older releases';
              }
            });
          }
        })
        .catch(function (err) {
          container.innerHTML = [
            '<div class="changelog-state">',
            '  Could not load releases. <a href="https://github.com/ddutchie/cairn/releases" target="_blank" rel="noopener">View on GitHub ↗</a>',
            '</div>',
          ].join('');
          console.error(err);
        });
    })();
  </script>
</body>
</html>
